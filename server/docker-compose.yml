services:
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft-server
    env_file:
      - ../.env
    environment:
      REPLACE_ENV_DURING_SYNC: "true"
      CFG_VOICE_CHAT_PORT: "${VOICE_CHAT_PORT:-24454}"
      CFG_VOICE_CHAT_TUNNEL_ADDRESS: "${VOICE_CHAT_TUNNEL_ADDRESS:-}"
    ports:
      - "25565:25565"
      - "25575:25575"
      - "${VOICE_CHAT_PORT:-24454}:${VOICE_CHAT_PORT:-24454}/udp"
    volumes:
      # Alternativa fora do repo: D:/minecraft-data:/data
      - ./data:/data
      - ./config:/config:ro
      - ./modpacks:/modpacks:ro
    stdin_open: true
    tty: true
    restart: unless-stopped

  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    container_name: playit-agent
    restart: unless-stopped
    network_mode: "service:minecraft"
    depends_on:
      - minecraft
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}
